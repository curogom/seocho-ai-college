<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">From feature engineering to representation learning</title>
  <desc id="desc">A visual note showing the shift from handcrafted features in traditional machine learning to learned representations in deep learning.</desc>
  <rect width="1280" height="720" fill="#f8faf7"/>
  <rect x="56" y="56" width="1168" height="608" rx="24" fill="#ffffff" stroke="#d8ded4" stroke-width="2"/>
  <text x="96" y="126" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#172026">Feature Engineering에서 Representation Learning으로</text>
  <text x="98" y="166" font-family="Arial, sans-serif" font-size="18" fill="#5d6861">강의자료의 핵심 흐름을 재구성한 학습용 도식</text>

  <g transform="translate(96 236)">
    <rect width="430" height="300" rx="16" fill="#f8faf7" stroke="#d8ded4" stroke-width="2"/>
    <text x="28" y="48" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#a75535">Traditional ML</text>
    <text x="28" y="82" font-family="Arial, sans-serif" font-size="17" fill="#172026">사람이 feature를 설계</text>
    <rect x="32" y="118" width="128" height="58" rx="8" fill="#172026"/>
    <text x="96" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f8faf7">Raw Data</text>
    <path d="M172 147H260" stroke="#3f6f5c" stroke-width="6" stroke-linecap="round"/>
    <path d="M252 132l22 15-22 15" fill="none" stroke="#3f6f5c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="278" y="108" width="120" height="78" rx="8" fill="#dbeafe" stroke="#86a6c8" stroke-width="2"/>
    <text x="338" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172026">Feature</text>
    <text x="338" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#172026">GPA, PageRank</text>
    <path d="M84 220H350" stroke="#d8ded4" stroke-width="2"/>
    <text x="215" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#172026">성능 병목: 좋은 입력 표현을</text>
    <text x="215" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#172026">사람이 얼마나 잘 설계하는가</text>
  </g>

  <g transform="translate(754 236)">
    <rect width="430" height="300" rx="16" fill="#f8faf7" stroke="#d8ded4" stroke-width="2"/>
    <text x="28" y="48" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#3f6f5c">Deep Learning</text>
    <text x="28" y="82" font-family="Arial, sans-serif" font-size="17" fill="#172026">모델이 representation을 학습</text>
    <rect x="34" y="128" width="84" height="58" rx="8" fill="#172026"/>
    <text x="76" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f8faf7">Input</text>
    <circle cx="178" cy="119" r="18" fill="#b68a2c"/>
    <circle cx="178" cy="157" r="18" fill="#b68a2c"/>
    <circle cx="178" cy="195" r="18" fill="#b68a2c"/>
    <circle cx="254" cy="119" r="18" fill="#3f6f5c"/>
    <circle cx="254" cy="157" r="18" fill="#3f6f5c"/>
    <circle cx="254" cy="195" r="18" fill="#3f6f5c"/>
    <path d="M118 157h42M196 119h40M196 157h40M196 195h40M272 157h42" stroke="#172026" stroke-width="3" stroke-linecap="round"/>
    <rect x="316" y="128" width="80" height="58" rx="8" fill="#a75535"/>
    <text x="356" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Output</text>
    <path d="M84 220H350" stroke="#d8ded4" stroke-width="2"/>
    <text x="215" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#172026">핵심 전환: feature 설계 일부를</text>
    <text x="215" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#172026">layer 학습으로 이동</text>
  </g>

  <path d="M548 384H722" stroke="#b68a2c" stroke-width="8" stroke-linecap="round"/>
  <path d="M704 362l34 22-34 22" fill="none" stroke="#b68a2c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="570" y="350" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172026">중심 이동</text>

  <g transform="translate(96 586)">
    <rect width="1088" height="44" rx="8" fill="#172026"/>
    <text x="28" y="29" font-family="Arial, sans-serif" font-size="18" fill="#f8faf7">AI -> ML -> Feature Engineering -> Logistic Regression -> DL/DNN -> CNN/RNN</text>
  </g>
</svg>
