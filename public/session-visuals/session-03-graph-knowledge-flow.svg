<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Graph thinking and knowledge graph flow</title>
  <desc id="desc">Objects and relations are organized into an ontology and a knowledge graph, then used for reasoning, search, question answering, and recommendation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6f5c" />
    </marker>
    <style>
      .bg { fill: #f8faf7; }
      .card { fill: #ffffff; stroke: #d7ded2; stroke-width: 2; }
      .soft { fill: #eef3ec; stroke: #d7ded2; stroke-width: 2; }
      .ink { fill: #172026; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .muted { fill: #5f676d; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .rust { fill: #a6573b; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .moss { fill: #3f6f5c; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .line { stroke: #3f6f5c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge { stroke: #a6573b; stroke-width: 3; fill: none; }
      .node { fill: #ffffff; stroke: #3f6f5c; stroke-width: 3; }
      .chip { fill: #f8faf7; stroke: #d7ded2; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="675" />
  <text x="70" y="78" class="rust" font-size="24" font-weight="700">GRAPH MACHINE LEARNING</text>
  <text x="70" y="124" class="ink" font-size="34" font-weight="800">관계 데이터를 Graph로 보는 관점</text>
  <text x="70" y="158" class="muted" font-size="19">객체보다 객체 사이의 연결을 먼저 구조화합니다.</text>

  <rect x="70" y="215" width="300" height="280" rx="8" class="card" />
  <text x="100" y="258" class="ink" font-size="24" font-weight="800">Objects</text>
  <text x="100" y="289" class="muted" font-size="17">사람 · 상품 · 문서 · 장소</text>
  <circle cx="155" cy="365" r="35" class="node" />
  <circle cx="260" cy="328" r="35" class="node" />
  <circle cx="262" cy="432" r="35" class="node" />
  <path d="M188 353 L227 340" class="edge" />
  <path d="M181 386 L230 415" class="edge" />
  <path d="M260 364 L262 396" class="edge" />
  <text x="148" y="373" class="moss" font-size="18" font-weight="800">A</text>
  <text x="253" y="336" class="moss" font-size="18" font-weight="800">B</text>
  <text x="255" y="440" class="moss" font-size="18" font-weight="800">C</text>
  <text x="100" y="472" class="moss" font-size="18" font-weight="800">Node + Edge + Relation</text>

  <path d="M395 355 L465 355" class="line" />

  <rect x="490" y="215" width="270" height="280" rx="8" class="soft" />
  <text x="520" y="258" class="ink" font-size="24" font-weight="800">Ontology</text>
  <text x="520" y="290" class="muted" font-size="17">
    <tspan x="520" dy="0">도메인의 객체와</tspan>
    <tspan x="520" dy="24">관계 타입을 정의</tspan>
  </text>
  <rect x="520" y="350" width="210" height="44" rx="6" class="chip" />
  <text x="545" y="378" class="ink" font-size="17" font-weight="700">Entity types</text>
  <rect x="520" y="410" width="210" height="44" rx="6" class="chip" />
  <text x="545" y="438" class="ink" font-size="17" font-weight="700">Relation schema</text>

  <path d="M785 355 L855 355" class="line" />

  <rect x="880" y="215" width="250" height="280" rx="8" class="card" />
  <text x="910" y="258" class="ink" font-size="23" font-weight="800">Knowledge Graph</text>
  <text x="910" y="290" class="muted" font-size="17">
    <tspan x="910" dy="0">사람의 지식을</tspan>
    <tspan x="910" dy="24">graph로 표현</tspan>
  </text>
  <rect x="910" y="350" width="190" height="44" rx="6" class="chip" />
  <text x="930" y="378" class="ink" font-size="16" font-weight="700">head · relation · tail</text>
  <rect x="910" y="410" width="190" height="44" rx="6" class="chip" />
  <text x="930" y="438" class="ink" font-size="16" font-weight="700">missing link 예측</text>

  <rect x="165" y="555" width="870" height="64" rx="8" fill="#172026" />
  <text x="215" y="585" fill="#f8faf7" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="19" font-weight="800">Reasoning</text>
  <text x="390" y="585" fill="#f8faf7" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="19" font-weight="800">Search</text>
  <text x="545" y="585" fill="#f8faf7" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="19" font-weight="800">QA</text>
  <text x="675" y="585" fill="#f8faf7" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="19" font-weight="800">Recommendation</text>
  <text x="215" y="606" fill="#cfd9ca" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15">관계를 따라가며 답을 찾는 구조</text>
</svg>
