<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Graph thinking and knowledge graph flow</title>
  <desc id="desc">Objects and relations become a graph, then an ontology and knowledge graph support reasoning, search, question answering, and recommendation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6f5c" />
    </marker>
    <style>
      .bg { fill: #f8faf7; }
      .card { fill: #ffffff; stroke: #d7ded2; stroke-width: 2; }
      .soft { fill: #eef3ec; stroke: #d7ded2; stroke-width: 2; }
      .ink { fill: #172026; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .muted { fill: #5f676d; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .rust { fill: #a6573b; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .moss { fill: #3f6f5c; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
      .line { stroke: #3f6f5c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge { stroke: #a6573b; stroke-width: 3; fill: none; }
      .node { fill: #ffffff; stroke: #3f6f5c; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="675" />
  <text x="70" y="78" class="rust" font-size="24" font-weight="700">GRAPH MACHINE LEARNING</text>
  <text x="70" y="124" class="ink" font-size="36" font-weight="800">관계 데이터를 Graph로 보는 관점</text>
  <text x="70" y="160" class="muted" font-size="20">객체 자체보다 객체 사이의 관계를 먼저 구조화합니다.</text>

  <rect x="70" y="220" width="290" height="275" rx="8" class="card" />
  <text x="100" y="262" class="ink" font-size="24" font-weight="800">Objects</text>
  <text x="100" y="292" class="muted" font-size="17">사람, 상품, 문서, 장소</text>
  <circle cx="155" cy="365" r="35" class="node" />
  <circle cx="255" cy="330" r="35" class="node" />
  <circle cx="260" cy="430" r="35" class="node" />
  <path d="M188 354 L222 342" class="edge" />
  <path d="M181 385 L229 413" class="edge" />
  <path d="M255 366 L258 394" class="edge" />
  <text x="138" y="373" class="moss" font-size="17" font-weight="700">A</text>
  <text x="238" y="338" class="moss" font-size="17" font-weight="700">B</text>
  <text x="243" y="438" class="moss" font-size="17" font-weight="700">C</text>
  <text x="115" y="480" class="muted" font-size="17">Node + Edge + Relation</text>

  <path d="M385 360 L470 360" class="line" />

  <rect x="495" y="220" width="260" height="275" rx="8" class="soft" />
  <text x="525" y="262" class="ink" font-size="24" font-weight="800">Ontology</text>
  <text x="525" y="292" class="muted" font-size="17">도메인의 객체와 관계 타입</text>
  <rect x="525" y="330" width="200" height="46" rx="6" class="card" />
  <text x="547" y="360" class="ink" font-size="17" font-weight="700">Entity types</text>
  <rect x="525" y="392" width="200" height="46" rx="6" class="card" />
  <text x="547" y="422" class="ink" font-size="17" font-weight="700">Relation schema</text>
  <text x="525" y="473" class="muted" font-size="17">무엇을 node와 edge로 볼지 정함</text>

  <path d="M780 360 L865 360" class="line" />

  <rect x="890" y="220" width="240" height="275" rx="8" class="card" />
  <text x="920" y="262" class="ink" font-size="24" font-weight="800">Knowledge Graph</text>
  <text x="920" y="292" class="muted" font-size="17">사람의 지식을 graph로 표현</text>
  <rect x="920" y="326" width="180" height="44" rx="6" fill="#f8faf7" stroke="#d7ded2" stroke-width="2" />
  <text x="940" y="354" class="ink" font-size="16">head - relation - tail</text>
  <rect x="920" y="386" width="180" height="44" rx="6" fill="#f8faf7" stroke="#d7ded2" stroke-width="2" />
  <text x="940" y="414" class="ink" font-size="16">missing link 찾기</text>
  <text x="920" y="473" class="muted" font-size="17">QA, Search, Recommendation</text>

  <rect x="235" y="555" width="730" height="62" rx="8" fill="#172026" />
  <text x="285" y="594" fill="#f8faf7" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="21" font-weight="800">관계를 따라가며 reasoning할 수 있게 만드는 것이 핵심</text>
</svg>

