<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">RAG indexing, retrieval, and generation flow</title>
  <desc id="desc">Documents are chunked and indexed as embeddings. A query retrieves relevant chunks, which are added to an LLM prompt for grounded generation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6f5c" /></marker>
    <style>
      .bg{fill:#f8faf7}.card{fill:#fff;stroke:#d7ded2;stroke-width:2}.soft{fill:#eef3ec;stroke:#d7ded2;stroke-width:2}.ink{fill:#172026;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5f676d;font-family:Arial,Helvetica,sans-serif}.rust{fill:#a6573b;font-family:Arial,Helvetica,sans-serif}.moss{fill:#3f6f5c;font-family:Arial,Helvetica,sans-serif}.line{stroke:#3f6f5c;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#a6573b;stroke-width:2.5;stroke-dasharray:8 8;fill:none}.chip{fill:#f8faf7;stroke:#d7ded2;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="72" class="rust" font-size="23" font-weight="700">RAG PREVIEW</text>
  <text x="70" y="116" class="ink" font-size="34" font-weight="800">문서를 검색 가능한 근거로 바꾼 뒤 답변에 넣습니다</text>
  <text x="70" y="151" class="muted" font-size="19">Indexing은 미리 준비하고, Retrieval과 Generation은 질문 시점에 실행합니다.</text>

  <rect x="70" y="208" width="650" height="320" rx="8" class="soft"/>
  <text x="100" y="250" class="rust" font-size="21" font-weight="800">OFFLINE INDEXING</text>
  <rect x="100" y="294" width="150" height="160" rx="8" class="card"/>
  <text x="128" y="335" class="ink" font-size="21" font-weight="800">Documents</text>
  <text x="128" y="373" class="muted" font-size="16">PDF, Wiki, DB</text>
  <text x="128" y="403" class="muted" font-size="16">Metadata</text>
  <path d="M250 374H305" class="line"/>
  <rect x="325" y="294" width="150" height="160" rx="8" class="card"/>
  <text x="357" y="335" class="ink" font-size="21" font-weight="800">Chunking</text>
  <rect x="357" y="365" width="86" height="24" rx="4" class="chip"/><rect x="357" y="399" width="66" height="24" rx="4" class="chip"/>
  <path d="M475 374H530" class="line"/>
  <rect x="550" y="294" width="140" height="160" rx="8" class="card"/>
  <text x="576" y="335" class="ink" font-size="20" font-weight="800">Embedding</text>
  <text x="580" y="378" class="moss" font-size="22" font-weight="800">[0.18, ...]</text>
  <text x="580" y="412" class="muted" font-size="15">vector + source</text>
  <rect x="100" y="556" width="590" height="60" rx="8" fill="#172026"/>
  <text x="133" y="594" fill="#f8faf7" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">Vector Database</text>
  <text x="360" y="594" fill="#f8faf7" font-family="Arial,Helvetica,sans-serif" font-size="17">ANN index + metadata filter</text>
  <path d="M620 454V556" class="line"/>

  <rect x="770" y="208" width="360" height="408" rx="8" class="card"/>
  <text x="800" y="250" class="rust" font-size="21" font-weight="800">ONLINE RETRIEVAL + GENERATION</text>
  <rect x="800" y="285" width="130" height="62" rx="8" class="soft"/>
  <text x="826" y="324" class="ink" font-size="18" font-weight="800">Question</text>
  <path d="M930 316H968" class="line"/>
  <rect x="988" y="285" width="112" height="62" rx="8" class="soft"/>
  <text x="1008" y="324" class="ink" font-size="17" font-weight="800">Embed</text>
  <path d="M1044 347V383" class="line"/>
  <rect x="830" y="402" width="240" height="62" rx="8" class="soft"/>
  <text x="865" y="440" class="ink" font-size="19" font-weight="800">Retrieve top-k chunks</text>
  <path d="M950 464V500" class="line"/>
  <rect x="810" y="520" width="280" height="62" rx="8" fill="#172026"/>
  <text x="836" y="558" fill="#f8faf7" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">LLM: question + evidence</text>
  <path d="M720 586H770" class="dash"/>
  <text x="770" y="652" class="muted" font-size="16">검색 근거를 답변 문맥으로 제공합니다.</text>
</svg>
