    <text x="170" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#172026">효율성과 정밀한 token interaction의 균형</text>
  </g>

  <path d="M916 368h96" stroke="#b68a2c" stroke-width="8" stroke-linecap="round"/>
  <path d="M994 344l36 24-36 24" fill="none" stroke="#b68a2c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1040 226)">
    <rect width="144" height="284" rx="16" fill="#f8faf7" stroke="#d8ded4" stroke-width="2"/>
    <text x="72" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#172026">SFM</text>
    <text x="72" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5d6861">과학 데이터</text>
    <circle cx="72" cy="124" r="30" fill="#dbeafe" stroke="#86a6c8" stroke-width="2"/>
    <text x="72" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#172026">PDE</text>
    <circle cx="72" cy="184" r="30" fill="#fde7d8" stroke="#d59a77" stroke-width="2"/>
    <text x="72" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#172026">Simulation</text>
    <circle cx="72" cy="244" r="30" fill="#e7efd8" stroke="#9bb578" stroke-width="2"/>
    <text x="72" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#172026">Observation</text>
  </g>

  <g transform="translate(96 596)">
    <rect width="1088" height="44" rx="8" fill="#172026"/>
    <text x="28" y="29" font-family="Arial, sans-serif" font-size="18" fill="#f8faf7">긴 sequence 비용 -> hybrid sequence module -> 과학·공학 데이터 기반 foundation model</text>
  </g>
