<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Superalignment and scalable oversight flow</title>
  <desc id="desc">Superalignment connects capability growth, conformity, scalable oversight, and policy reward co-evolution.</desc>
  <defs>
    <style>
      .bg{fill:#f8f7f2}
      .ink{fill:#182129}
      .muted{fill:#616b72}
      .rust{fill:#a95736}
      .teal{fill:#0d7f83}
      .moss{fill:#4f6f5f}
      .gold{fill:#c69b4a}
      .card{fill:#fff;stroke:#d8d5ca;stroke-width:2}
      .band{fill:#efece3;stroke:#d8d5ca;stroke-width:2}
      .line{fill:none;stroke:#0d7f83;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      text{font-family:Arial, Helvetica, sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1280" height="560"/>
  <text x="64" y="74" class="ink" font-size="36" font-weight="800">Superalignment Needs Scalable Oversight</text>
  <text x="64" y="112" class="muted" font-size="21">Capability growth must be paired with conformity and adaptive reward signals</text>

  <rect class="card" x="70" y="156" width="222" height="246" rx="8"/>
  <text x="102" y="206" class="teal" font-size="24" font-weight="800">ANI</text>
  <text x="102" y="248" class="ink" font-size="20">specialized</text>
  <text x="102" y="280" class="ink" font-size="20">task ability</text>
  <text x="102" y="344" class="muted" font-size="18">human can judge</text>

  <rect class="card" x="366" y="156" width="222" height="246" rx="8"/>
  <text x="398" y="206" class="teal" font-size="24" font-weight="800">AGI</text>
  <text x="398" y="248" class="ink" font-size="20">general</text>
  <text x="398" y="280" class="ink" font-size="20">capability</text>
  <text x="398" y="344" class="muted" font-size="18">mixed oversight</text>

  <rect class="card" x="662" y="156" width="222" height="246" rx="8"/>
  <text x="694" y="206" class="teal" font-size="24" font-weight="800">ASI</text>
  <text x="694" y="248" class="ink" font-size="20">beyond human</text>
  <text x="694" y="280" class="ink" font-size="20">capability</text>
  <text x="694" y="344" class="muted" font-size="18">oversight bottleneck</text>

  <rect class="card" x="972" y="132" width="222" height="294" rx="8"/>
  <text x="1004" y="184" class="teal" font-size="24" font-weight="800">UniPRO</text>
  <rect class="band" x="1004" y="222" width="158" height="46" rx="8"/>
  <text x="1034" y="252" class="ink" font-size="18" font-weight="700">Policy</text>
  <rect class="band" x="1004" y="306" width="158" height="46" rx="8"/>
  <text x="1032" y="336" class="ink" font-size="18" font-weight="700">Reward</text>
  <path class="line" d="M1084 270v34"/>
  <path class="line" d="M1084 304l-12-14h24z"/>
  <path class="line" d="M1084 306v-34"/>
  <path class="line" d="M1084 272l-12 14h24z"/>
  <text x="1004" y="390" class="muted" font-size="17">co-evolve on hard tasks</text>

  <path class="line" d="M292 280h74"/>
  <path class="line" d="M588 280h74"/>
  <path class="line" d="M884 280h88"/>
  <path class="line" d="M342 280l-18-14v28z"/>
  <path class="line" d="M638 280l-18-14v28z"/>
  <path class="line" d="M948 280l-18-14v28z"/>

  <path d="M154 456h456" stroke="#c69b4a" stroke-width="7" stroke-linecap="round"/>
  <path d="M610 456h456" stroke="#a95736" stroke-width="7" stroke-linecap="round"/>
  <text x="154" y="492" class="ink" font-size="21" font-weight="700">Competence: solve harder tasks</text>
  <text x="646" y="492" class="ink" font-size="21" font-weight="700">Conformity: stay aligned under scale</text>
</svg>
