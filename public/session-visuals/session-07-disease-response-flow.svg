<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Infectious disease data science flow</title>
  <desc id="desc">Disease response data science connects quarantine prediction, economic impact modeling, and contact tracing.</desc>
  <defs>
    <style>
      .bg{fill:#f7f4ed}
      .ink{fill:#182129}
      .muted{fill:#5f6870}
      .rust{fill:#a95736}
      .teal{fill:#0d7f83}
      .moss{fill:#4f6f5f}
      .gold{fill:#c69b4a}
      .card{fill:#fff;stroke:#d8d5ca;stroke-width:2}
      .line{fill:none;stroke:#0d7f83;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      text{font-family:Arial, Helvetica, sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1280" height="560"/>
  <text x="64" y="76" class="ink" font-size="37" font-weight="800">Data Science for Disease Response</text>
  <text x="64" y="114" class="muted" font-size="21">three public-health decisions, three different prediction units</text>

  <rect class="card" x="78" y="178" width="310" height="214" rx="8"/>
  <text x="112" y="226" class="teal" font-size="25" font-weight="800">Quarantine</text>
  <text x="112" y="266" class="ink" font-size="20">Imported Case Prediction</text>
  <text x="112" y="300" class="ink" font-size="20">Infection Risk</text>
  <text x="112" y="334" class="ink" font-size="20">Inbound Flow</text>

  <rect class="card" x="486" y="178" width="310" height="214" rx="8"/>
  <text x="520" y="226" class="teal" font-size="25" font-weight="800">Economic Aid</text>
  <text x="520" y="266" class="ink" font-size="20">Fine-Grained EEM</text>
  <text x="520" y="300" class="ink" font-size="20">District-Business Pair</text>
  <text x="520" y="334" class="ink" font-size="20">COVID-EENet</text>

  <rect class="card" x="894" y="178" width="310" height="214" rx="8"/>
  <text x="928" y="226" class="teal" font-size="25" font-weight="800">Epidemiology</text>
  <text x="928" y="266" class="ink" font-size="20">Digital Contact Tracing</text>
  <text x="928" y="300" class="ink" font-size="20">POI Reconstruction</text>
  <text x="928" y="334" class="ink" font-size="20">Pincette</text>

  <path class="line" d="M388 286h98"/>
  <path class="line" d="M796 286h98"/>
  <path class="line" d="M452 286l-18-14v28z"/>
  <path class="line" d="M860 286l-18-14v28z"/>

  <rect x="164" y="456" width="952" height="62" rx="8" fill="#182129"/>
  <text x="204" y="496" fill="#f7f4ed" font-size="23" font-weight="800">Privacy-aware decision support</text>
  <text x="554" y="496" fill="#f7f4ed" font-size="19">minimum data, purpose limitation, explainability, audit</text>
</svg>
